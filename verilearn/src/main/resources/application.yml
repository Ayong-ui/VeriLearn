spring:
  application:
    name: verilearn
  datasource:
    url: ${VERILEARN_DB_URL:jdbc:mysql://localhost:3306/verilearn?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${VERILEARN_DB_USERNAME:root}
    password: ${VERILEARN_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always

server:
  port: 8080

verilearn:
  ai:
    base-url: ${VERILEARN_AI_BASE_URL:https://api.deepseek.com}
    api-key: ${VERILEARN_AI_API_KEY:}
    model: ${VERILEARN_AI_MODEL:deepseek-chat}
  feishu:
    base-url: ${VERILEARN_FEISHU_BASE_URL:https://open.feishu.cn/open-apis}
    app-id: ${VERILEARN_FEISHU_APP_ID:}
    app-secret: ${VERILEARN_FEISHU_APP_SECRET:}
    verification-token: ${VERILEARN_FEISHU_VERIFICATION_TOKEN:}
  schedule:
    daily-task-cron: "0 0 8 * * ?"
  storage:
    learning-space-root: ${VERILEARN_LEARNING_SPACE_ROOT:${user.dir}/learning-space}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
